<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Org Registration</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="bg-shapes"> </div>

    <div class="glass-card">
        <h2 style="color: white; text-align: center;">Organization Registration</h2>
        <form id="regForm">
            <input type="text" name="full_name" placeholder="Full Name" required>
            <div style="display: flex; gap: 10px;">
                <input type="number" name="age" placeholder="Age" required>
                <select name="gender" required>
                    <option value="" disabled selected>Gender</option>
                    <option value="Male">Male</option>
                    <option value="Female">Female</option>
                </select>
            </div>
            <input type="text" name="address" placeholder="Address" required>
            <input type="text" name="contact" placeholder="Contact Number" required>
            <input type="email" name="email" placeholder="Email Address" required>
            <input type="text" name="dept" placeholder="Department/Org" required>
            <button type="submit" id="submitBtn">Register Now</button>
        </form>
    </div>

    <script src="script.js"></script>
</body>
</html>
